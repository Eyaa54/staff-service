server.port=8084
spring.application.name=staff-service

# --- Base de données PostgreSQL (via docker-compose) ---
spring.datasource.url=jdbc:postgresql://staff-db:5432/staff_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- Eureka (l'annuaire sur PC1) ---
# Tu remplaceras PC1_IP par la vraie IP plus tard
eureka.client.service-url.defaultZone=http://172.16.1.70:8761/eureka/

# Pour tester SEULE sur ton PC (sans PC1), décommente la ligne suivante :
# eureka.client.enabled=false

# --- Swagger ---
springdoc.swagger-ui.path=/swagger-ui.html